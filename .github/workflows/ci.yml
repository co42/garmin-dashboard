name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: svelte-check
        run: npx svelte-kit sync && npx svelte-check --tsconfig ./tsconfig.json --fail-on-warnings

      - name: Build
        run: npm run build
